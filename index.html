<!DOCTYPE html>
<html lang="fr-CA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sélection des Services - Radio-Canada</title>
    <style>
        :root {
            --rc-red: #FF0000;
            --rc-dark: #121212;
            --gnome-bg: #242424;
            --gnome-card: rgba(255, 255, 255, 0.1);
            --gnome-hover: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --font-stack: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--gnome-bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animation d'arrière-plan style Radio-Canada */
        .background-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #330000 0%, #121212 100%);
        }

        .circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid var(--rc-red);
            border-radius: 50%;
            opacity: 0;
            animation: pulse 8s infinite;
        }

        @keyframes pulse {
            0% { width: 0; height: 0; opacity: 0.5; }
            100% { width: 150vmax; height: 150vmax; opacity: 0; }
        }

        /* Conteneur principal style GNOME 40 */
        .container {
            text-align: center;
            backdrop-filter: blur(20px);
            background: var(--gnome-card);
            padding: 3rem;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 600px;
            transform: scale(0.95);
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            to { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-weight: 600;
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .choice-card {
            background: var(--gnome-card);
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid transparent;
        }

        .choice-card:hover {
            background: var(--gnome-hover);
            transform: translateY(-2px);
            border-color: var(--rc-red);
        }

        .choice-card span {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .arrow {
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .choice-card:hover .arrow {
            transform: translateX(8px);
        }

        .footer-logo {
            margin-top: 2rem;
            font-size: 0.8rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="background-animation" id="bg"></div>

    <div class="container">
        <h1>Où désirez-vous aller ?</h1>
        
        <div class="grid">
            <a href="https://ici.radio-canada.ca/" class="choice-card">
                <span>ICI Radio-Canada.ca</span>
                <span class="arrow">→</span>
            </a>
            
            <a href="https://ici.radio-canada.ca/ohdio" class="choice-card">
                <span>ICI TOUT.TV</span>
                <span class="arrow">→</span>
            </a>
            
            <a href="https://ici.tou.tv/" class="choice-card">
                <span>ICI OHdio</span>
                <span class="arrow">→</span>
            </a>
        </div>

        <div class="footer-logo">Services Numériques</div>
    </div>

    <script>
        // Création de l'animation des cercles en arrière-plan
        const bg = document.getElementById('bg');
        const colors = ['#FF0000', '#CC0000', '#990000'];

        function createCircle() {
            const circle = document.createElement('div');
            circle.className = 'circle';
            
            // On alterne légèrement les couleurs de rouge
            circle.style.borderColor = colors[Math.floor(Math.random() * colors.length)];
            
            bg.appendChild(circle);

            // On retire l'élément après l'animation pour ne pas surcharger le DOM
            setTimeout(() => {
                circle.remove();
            }, 8000);
        }

        // Lance un nouveau cercle toutes les 2 secondes
        setInterval(createCircle, 2000);

        // Initialisation
        createCircle();
    </script>
</body>
</html>
